<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Đại học Đồng Tháp - Đăng nhập SSO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f4c81;
            --primary-light: #2c7bb6;
            --primary-dark: #0b3d68;
            --bg-gradient: linear-gradient(135deg, #e6f0fa 0%, #f8fbfd 50%, #e0f0ff 100%);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-blur: blur(20px);
            --glass-border: rgba(44, 123, 182, 0.3);
            --text: #1e293b;
            --text-muted: #475569;
            --error: #dc2626;
            --radius: 20px;
            --shadow: 0 12px 40px rgba(15, 76, 129, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            color: var(--text);
            background: var(--bg-gradient);
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .animated-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(44,123,182,0.08), rgba(46,204,113,0.05));
            backdrop-filter: blur(4px);
            animation: float 22s infinite ease-in-out;
        }

            .shape:nth-child(1) {
                width: 220px;
                height: 220px;
                top: 12%;
                left: 7%;
                animation-duration: 26s;
            }

            .shape:nth-child(2) {
                width: 180px;
                height: 180px;
                bottom: 18%;
                right: 9%;
                animation-duration: 30s;
                animation-delay: 6s;
            }

            .shape:nth-child(3) {
                width: 260px;
                height: 260px;
                top: 48%;
                right: 6%;
                animation-duration: 34s;
                animation-delay: 12s;
            }

            .shape:nth-child(4) {
                width: 140px;
                height: 140px;
                bottom: 32%;
                left: 14%;
                animation-duration: 24s;
                animation-delay: 18s;
            }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.6;
            }

            25% {
                transform: translate(60px, -50px) rotate(20deg);
                opacity: 0.8;
            }

            50% {
                transform: translate(-40px, 70px) rotate(-15deg);
                opacity: 0.7;
            }

            75% {
                transform: translate(50px, 40px) rotate(10deg);
                opacity: 0.9;
            }
        }

        header.app-header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(44,123,182,0.2);
            padding: 0.9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 14px rgba(15,76,129,0.1);
        }

        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

            .logo img {
                height: 44px;
                width: auto;
                object-fit: contain;
                border-radius: 6px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
        }

        .login-container {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.5);
            padding: 3.2rem 2.8rem; /* Tăng padding cho thoáng */
            width: 100%;
            max-width: 460px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

            .login-container:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 60px rgba(15,76,129,0.2);
            }

        .login-header {
            text-align: center;
            margin-bottom: 2.8rem; /* Tăng khoảng cách dưới header */
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.6rem;
        }

        .login-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 2rem; /* Tăng khoảng cách giữa các field */
        }

        label {
            display: block;
            font-size: 0.98rem;
            font-weight: 600;
            margin-bottom: 0.7rem;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 1.05rem 1.3rem; /* Padding input lớn hơn, dễ nhập */
            border: 1px solid rgba(44,123,182,0.3);
            border-radius: 12px;
            font-size: 1.05rem;
            background: rgba(255,255,255,0.7);
            color: var(--text);
            transition: all 0.25s ease;
        }

            input:focus {
                outline: none;
                border-color: var(--primary-light);
                box-shadow: 0 0 0 4px rgba(44,123,182,0.2);
                background: white;
            }

            input::placeholder {
                color: rgba(71,85,105,0.65);
            }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1.3rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.25rem;
        }

        .btn-primary {
            width: 100%;
            padding: 1.15rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 1.2rem;
            box-shadow: 0 8px 20px rgba(15,76,129,0.3);
        }

            .btn-primary:hover {
                background: var(--primary-light);
                transform: translateY(-3px);
                box-shadow: 0 12px 28px rgba(44,123,182,0.4);
            }

            .btn-primary.loading {
                opacity: 0.75;
                cursor: wait;
            }

        .error-message {
            color: var(--error);
            font-size: 0.95rem;
            text-align: center;
            margin: 1.2rem 0;
            min-height: 1.4rem;
        }

        .extra-links {
            text-align: center;
            margin-top: 2rem; /* Tăng khoảng cách trên extra-links */
            font-size: 0.95rem;
        }

            .extra-links a {
                color: var(--primary-light);
                text-decoration: none;
                margin: 0 1.4rem;
            }

                .extra-links a:hover {
                    text-decoration: underline;
                }

        footer {
            padding: 2rem 1rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(44,123,182,0.15);
            margin-top: auto;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2.8rem 1.8rem;
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
            }

            .logo img {
                height: 38px;
            }

            .shape {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <img src="https://www.dthu.edu.vn/img/logo.png" alt="Logo Đại học Đồng Tháp">
                Hệ Thống Xác Thực Tập Trung
            </div>
            <div style="font-weight:500; color:var(--text-muted);">Single Sign-On</div>
        </div>
    </header>

    <main>
        <div class="login-container">
            <div class="login-header">
                <h1 class="login-title">Đăng nhập hệ thống</h1>
                <p class="login-subtitle">Cổng truy cập dịch vụ số - Đại học Đồng Tháp</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input id="username" type="text" placeholder="Tên đăng nhập của bạn" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-wrapper">
                        <input id="password" type="password" placeholder="Nhập mật khẩu của bạn" autocomplete="current-password" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                <button id="loginBtn" type="button" class="btn-primary" onclick="login()">Đăng nhập</button>
                <div class="error-message" id="error"></div>
            </form>

        </div>
    </main>

    <footer>
        © 2026 Hệ Thống Xác Thực Tập Trung - Trường Đại học Đồng Tháp.
        <a href="#">Bảo mật</a> • <a href="#">Điều khoản</a> • <a href="#">Hỗ trợ</a>
    </footer>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        document.addEventListener("keypress", e => {
            if (e.key === "Enter") login();
        });

        async function login() {
            const btn = document.getElementById("loginBtn");
            const errorEl = document.getElementById("error");
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            errorEl.textContent = "";

            if (!username || !password) {
                errorEl.textContent = "Vui lòng nhập đầy đủ thông tin.";
                return;
            }

            btn.classList.add("loading");
            btn.textContent = "Đang xác thực...";

            try {
                const res = await fetch("/api/auth/login-swagger", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username,
                        password,
                        clientId: "tracuuvanbang"
                    })
                });
                const data = await res.json();
                if (data.isAdmin) {
                    //document.cookie = `swagger_token=${data.accessToken}; path=/; samesite=strict; secure`;
                    document.cookie = `swagger_token=${data.accessToken}; path=/; samesite=lax`;
                    window.location = "/swagger";
                } else {
                    errorEl.textContent = data.message || "Tài khoản không có quyền truy cập.";
                }
            } catch (err) {
                errorEl.textContent = "Không thể kết nối server. Vui lòng thử lại.";
            } finally {
                btn.classList.remove("loading");
                btn.textContent = "Đăng nhập";
            }
        }
    </script>
</body>
</html>
